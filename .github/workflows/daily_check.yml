name: Bot Pantau Reksadana Harian

on:
  schedule:
    # JADWAL CRON (Waktu UTC)
    # Rumus: Jam WITA dikurangi 8 Jam
    # Target: 21:30 WITA = 13:30 UTC
    # Format: Menit Jam * * *
    - cron: '15 02 * * *' 
  
  # Tombol Manual (Biar bisa ditest klik 'Run Workflow')
  workflow_dispatch:

jobs:
  jalankan-bot:
    runs-on: ubuntu-latest
    
    steps:
      - name: 1. Ambil Kodingan (Checkout)
        uses: actions/checkout@v3

      - name: 2. Siapkan Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 3. Install Library
        run: |
          pip install -r requirements.txt

      - name: 4. Jalankan Bot
        env:
          # Mengambil kunci rahasia dari GitHub Settings
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot.py


#daily_check.yml
